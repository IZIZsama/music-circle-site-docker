services:
  mysql:
    image: mysql:8.0
    container_name: band-practice-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bandpractice
      MYSQL_DATABASE: band_practice
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pbandpractice"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: band-practice-server
    restart: unless-stopped
    environment:
      PORT: 3001
      CLIENT_ORIGIN: https://ktc-music-circle.com
      DATABASE_URL: mysql://root:bandpractice@mysql:3306/band_practice
      SESSION_SECRET: 9c14c7c8a4d6492c9c84e0f6c5c9db4aef2f3d4c5b6a7e8f9d0a1b2c3d4e5f6
      NODE_ENV: production
      APP_ENV: https
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3001"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: band-practice-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server

  nginx:
    image: nginx:1.27-alpine
    container_name: band-practice-nginx
    restart: unless-stopped
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  mysql_data:
