server {
    listen 80;
    server_name ktc-music-circle.com www.ktc-music-circle.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ktc-music-circle.com www.ktc-music-circle.com;

    ssl_certificate /etc/letsencrypt/live/ktc-music-circle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ktc-music-circle.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://client:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://server:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://server:3001/uploads/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
